[pytest]
testpaths = somef/src/somef/test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

norecursedirs = test_data .git .venv __pycache__ *.egg-info
filterwarnings =
    ignore::pyparsing.PyparsingDeprecationWarning
    # textblob internal regex patterns use escape sequences like "\."
    # which trigger warnings in modern Python versions.
    #
    # In Python 3.11 this appears as DeprecationWarning.
    # In Python 3.12 this appears as SyntaxWarning.
    #
    # These warnings originate from textblob's internal implementation and
    # cannot be fixed from SOMEF with the current textblob version.
    ignore:invalid escape sequence:DeprecationWarning:textblob
    ignore:invalid escape sequence:SyntaxWarning:textblob


