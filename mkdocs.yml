extra_css:
  - stylesheets/mkdocs.css
site_name: SOMEF documentation
nav:
  - Home: index.md
  - Install: install.md
  - Usage: usage.md
  - Output: output.md
  - Supported metadata files: supported_metadata_files.md
  - Supported languages: supported_languages.md

theme:
  name: material
  features:
    - navigation.expand
markdown_extensions:
  - admonition
  - codehilite:
      guess_lang: false
  - toc:
      permalink: true
